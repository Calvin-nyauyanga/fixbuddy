<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../../node_modules/@fontsource/poppins/index.css">
    <meta charset="UTF-8">
    <title>Forgot Password – FixBuddy</title>
    <link rel="stylesheet" href="/CSS-STYLING-UNIVERSAL/STYLING-UNIVERSAL.css">
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker registered:', reg))
        .catch(err => console.log('Service Worker registration failed:', err));
}
</script>
</head>
<body class="forgotpw-body">
    <div class="forgotpw-container">
        <h2>Forgot Password</h2>
        <form id="forgotPasswordForm">
            <label for="email">Enter your email:</label>
            <input type="email" id="email" name="email" required>
            <button type="submit">Send OTP</button>
        </form>
        <div id="message" class="forgotpw-message"></div>
    </div>

    <script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;

        const response = await fetch('/api/send-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });

        const result = await response.json();
        document.getElementById('message').textContent = result.message;
        if (result.message && result.message.toLowerCase().includes('otp sent')) {
            setTimeout(function() {
                window.location.href = 'VerifyOTP.html';
            }, 1200); // Wait 1.2 seconds before redirecting
        }
    });
    </script>
</body>
</html>
