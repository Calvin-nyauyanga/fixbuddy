<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>FixBuddy - Settings</title>
    <link rel="stylesheet" href="../css-styling/STYLING-UNIVERSAL.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <script src="/backend/offline-auth.js"></script>
    <script src="/backend/site-utils.js"></script>
</head>
<body class="login-body">
    <main class="login-container">
        <div class="login-card">
            <h1 class="login-heading">Settings</h1>
            <p class="login-subheading">Manage your local account and offline data</p>

            <div class="form-group">
                <label>Current user</label>
                <div id="currentUser">Not signed in</div>
            </div>

            <hr />

            <div class="form-group">
                <label for="newPassword">Change local password (offline only)</label>
                <input id="newPassword" type="password" placeholder="New password" />
                <button id="changePwdBtn" class="btn btn-primary">Change Local Password</button>
                <div id="changePwdMsg" style="margin-top:0.5rem"></div>
            </div>

            <div class="form-group">
                <label>Offline data</label>
                <button id="clearOfflineBtn" class="btn btn-secondary">Clear Offline Data</button>
                <div id="clearMsg" style="margin-top:0.5rem"></div>
            </div>

            <div style="margin-top:1rem">
                <a href="../UserDashboard/UserDashboard.html" class="btn btn-secondary">Back to Dashboard</a>
            </div>
        </div>
    </main>

    <script>
        // show current user
        try {
            const cur = JSON.parse(localStorage.getItem('fixbuddy_current_user')) || null;
            if (cur && cur.email) {
                document.getElementById('currentUser').textContent = cur.name ? `${cur.name} <${cur.email}>` : cur.email;
            }
        } catch (e) { }

        document.getElementById('changePwdBtn').addEventListener('click', async function () {
            const newPwd = document.getElementById('newPassword').value;
            const msg = document.getElementById('changePwdMsg');
            msg.textContent = '';
            if (!newPwd) { msg.textContent = 'Enter a new password.'; return; }
            try {
                const cur = JSON.parse(localStorage.getItem('fixbuddy_current_user'));
                if (!cur || !cur.email) { msg.textContent = 'No current user found.'; return; }
                const users = getLocalUsers();
                const u = users[cur.email];
                if (!u) { msg.textContent = 'No local record found for current user.'; return; }
                const hash = await sha256Hex(newPwd);
                u.passwordHash = hash;
                saveLocalUsers(users);
                msg.textContent = 'Local password updated.';
            } catch (err) {
                console.error(err);
                msg.textContent = 'Failed to update password.';
            }
        });

        document.getElementById('clearOfflineBtn').addEventListener('click', function () {
            try {
                localStorage.removeItem('fixbuddy_users');
                localStorage.removeItem('fixbuddy_current_user');
                document.getElementById('clearMsg').textContent = 'Offline data cleared.';
            } catch (err) {
                document.getElementById('clearMsg').textContent = 'Failed to clear data.';
            }
        });
    </script>
</body>
</html>
