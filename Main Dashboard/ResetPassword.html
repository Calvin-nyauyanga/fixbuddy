<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password – FixBuddy</title>
    <link rel="stylesheet" href="/CSS-STYLING-UNIVERSAL/STYLING-UNIVERSAL.css">
</head>
<body class="resetpw-body">
    <div class="resetpw-container">
        <h2>Reset Password</h2>
        <form id="resetPasswordForm">
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <label for="newPassword">New Password:</label>
            <input type="password" id="newPassword" required>
            <button type="submit">Set New Password</button>
        </form>
        <div id="message" class="resetpw-message"></div>
    </div>
    <script>
    // Prefill email from localStorage if available
    const resetEmail = localStorage.getItem('resetEmail');
    if(resetEmail) {
        document.getElementById('email').value = resetEmail;
    }
    document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const newPassword = document.getElementById('newPassword').value;
        const response = await fetch('/api/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, newPassword })
        });
        const result = await response.json();
        document.getElementById('message').textContent = result.message;
        if(result.message && result.message.toLowerCase().includes('success')) {
            localStorage.removeItem('resetEmail');
            setTimeout(function() {
                window.location.href = '../UserLoginPage.html';
            }, 1500);
        }
    });
    </script>
</body>
</html>
