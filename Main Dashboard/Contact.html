<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../node_modules/@fontsource/poppins/index.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixBuddy - Contact Us</title>
    <link rel="stylesheet" href="css-styling/STYLING-UNIVERSAL.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker registered:', reg))
        .catch(err => console.log('Service Worker registration failed:', err));
}
</script>
</head>
<body class="main-body">

    <header class="topbar dashboard-header">
        <div class="logo">🖥️ <span>FixBuddy</span></div>
        <nav class="topbar-nav">
            <a href="MainDashBoard.html" class="topbar-nav-item">Home</a>
            <a href="#" class="topbar-nav-item">About Us</a>
            <a href="SupportPage.html" class="topbar-nav-item">Support</a>
            <a href="Contact.html" class="topbar-nav-item active">Contact Us</a>
        </nav>
        <div class="topbar-auth">
            <a href="UserLogin.html" class="btn btn-primary">Login</a>
            <a href="SignUp.html" class="btn btn-secondary">Sign Up</a>
        </div>
    </header>

    <main class="main-content">
        <div class="content-row">
            <div class="card contact-form-container">
                <h2>Send Us a Message</h2>
                <form action="#" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" name="message" rows="6" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>

            <div class="card contact-info-container">
                <h2>Contact Information</h2>
                <div class="contact-info-item">
                    <i class="fa-solid fa-envelope"></i>
                    <span>support@fixbuddy.com</span>
                </div>
                <div class="contact-info-item">
                    <i class="fa-solid fa-phone"></i>
                    <span>+1 (555) 123-4567</span>
                </div>
                <div class="contact-info-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>123 Tech Lane, Innovation City, CA 12345</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <span>© <span id="year"></span> <strong>FixBuddy</strong></span>
        <span class="footer-sep">|</span>
    <a href="PrivacyandPolicy.html">Privacy Policy</a>
        <span class="footer-sep">|</span>
    <a href="TermsPage.html">Terms of Use</a>
    </footer>
    
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
