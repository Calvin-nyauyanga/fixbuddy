<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../../node_modules/@fontsource/poppins/index.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixBuddy - Admin Login</title>
    <link rel="stylesheet" href="../../css-styling/STYLING-UNIVERSAL.css">
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker registered:', reg))
        .catch(err => console.log('Service Worker registration failed:', err));
}
</script>
</head>

<body class="login-body">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

    <main class="login-container">
        <div class="login-card">
            <h1 class="login-heading">Admin Login</h1>
            <p class="login-subheading">Please sign in to your admin account</p>
            <form action="#" method="POST" class="login-form">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="form-options">
                    <a href="#" id="adminForgotPw" class="btn btn-link">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary login-btn">Sign In</button>
                <div id="adminLoginMessage" style="margin-top:1em;"></div>
            </form>
            
            <div class="login-options-footer">
                <a href="http://localhost:3000/user-login" class="btn btn-secondary login-btn">Back to User Login</a>
            </div>
        </div>
    </main>

    <footer>
        <span>© <span id="year"></span> <strong>FixBuddy</strong></span>
        <span class="footer-sep">|</span>
    <a href="../PrivacyandPolicy.html">Privacy Policy</a>
        <span class="footer-sep">|</span>
    <a href="../TermsPage.html">Terms of Use</a>
    </footer>
    <script>
        
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
    
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // Admin login form submit
        document.querySelector('.login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('adminLoginMessage');
            messageDiv.textContent = '';
            if (!email || !password) {
                messageDiv.textContent = 'Please enter both email and password.';
                return;
            }
            // Simple email format validation
            const emailPattern = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
            if (!emailPattern.test(email)) {
                messageDiv.textContent = 'Please enter a valid email address.';
                return;
            }
            try {
                const response = await fetch('/api/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await response.json();
                messageDiv.textContent = result.message;
                if (result.success) {
                    // Redirect to admin dashboard or desired page
                    setTimeout(() => {
                        window.location.href = '../AdminDashBoard/AdminDashBoard.html';
                    }, 1000);
                }
            } catch (err) {
                messageDiv.textContent = 'Server error. Please try again.';
            }
        });

        // Admin forgot password (send OTP) logic
        document.getElementById('adminForgotPw').addEventListener('click', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            if (!email) {
                document.getElementById('adminLoginMessage').textContent = 'Please enter your email above first.';
                return;
            }
            const response = await fetch('/api/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const result = await response.json();
            document.getElementById('adminLoginMessage').textContent = result.message;
            if (result.message && result.message.toLowerCase().includes('otp sent')) {
                localStorage.setItem('resetEmail', email);
                setTimeout(function() {
                    window.location.href = 'VerifyOTP.html';
                }, 1200);
            }
        });

        // Back to User Login navigation
        document.querySelector('.login-options-footer .btn-secondary.login-btn').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'http://localhost:3000/user-login';
        });
    </script>
</body>
</html>
