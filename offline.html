<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline - FixBuddy</title>
    <link rel="stylesheet" href="/CSS-STYLING-UNIVERSAL/STYLING-UNIVERSAL.css">
    <style>
        .offline-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }

        .offline-icon {
            font-size: 5rem;
            margin-bottom: 2rem;
            color: var(--primary-color);
        }

        .offline-container h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        .offline-container p {
            font-size: 1.1rem;
            color: var(--text-light);
            max-width: 600px;
            margin-bottom: 2rem;
        }

        .offline-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .offline-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .offline-btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .offline-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(93, 83, 246, 0.3);
        }

        .offline-btn-secondary {
            background-color: var(--light-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
        }

        .offline-btn-secondary:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .cached-pages {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .cached-pages h3 {
            color: var(--text-color);
            margin-bottom: 1rem;
        }

        .cached-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: center;
        }

        .cached-links a {
            color: var(--primary-color);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .cached-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>FixBuddy requires an internet connection to function. Please check your connection and try again.</p>

        <div class="offline-actions">
            <button class="offline-btn offline-btn-primary" onclick="location.reload()">
                Try Again
            </button>
            <button class="offline-btn offline-btn-secondary" onclick="goHome()">
                Go to Home
            </button>
        </div>

        <div class="cached-pages">
            <h3>Previously Visited Pages (Cached)</h3>
            <div class="cached-links">
                <a href="/UserDashboard/view-my-tickets.html">My Tickets</a>
                <a href="/UserDashboard/submitticket.html">Submit Ticket</a>
                <a href="/">Home</a>
            </div>
        </div>
    </div>

    <script>
        function goHome() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
