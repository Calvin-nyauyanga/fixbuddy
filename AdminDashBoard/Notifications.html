<!DOCTYPE html>
<html lang="en">
<head>

<script>

}

            <div class="user-info">

    <main class="dashboard-main">
        <aside class="sidebar">
            <h2 class="sidebar-heading">FixBuddy</h2>
            <nav class="sidebar-nav">
                <a href="AdminDashBoard.html" class="sidebar-nav-item">
                    <i class="fa-solid fa-gauge"></i>

                <a href="ManageTickets.html" class="sidebar-nav-item">

                </a>
                <a href="Notifications.html" class="sidebar-nav-item active">
                    <i class="fa-solid fa-bell"></i>
                    <span>Notifications</span>
                </a>
                <a href="../Main Dashboard/JS LOGIC/AdminLoginPage.html" class="sidebar-nav-item">
                    <i class="fa-solid fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>

        <section class="admin-notifications-section">
