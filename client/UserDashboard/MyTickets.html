<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../node_modules/@fontsource/poppins/index.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixBuddy – My Tickets</title>
    <link rel="stylesheet" href="../CSS-STYLING-UNIVERSAL/STYLING-UNIVERSAL.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-dashboard-body">

    <header class="topbar dashboard-header">
        <div class="logo">🖥️ <span>FixBuddy</span></div>
        <div class="admin-topbar-right">
            <span class="welcome-message">👋 Hi, User Name</span>
            <div class="user-info">
                <i class="fa-solid fa-bell notifications-icon"></i>
                <span class="notification-badge">3</span>
                <i class="fa-solid fa-user-circle admin-profile-icon"></i>
            </div>
        </div>
    </header>

    <main class="dashboard-main">
        <aside class="sidebar">
            <h2 class="sidebar-heading">FixBuddy</h2>
            <nav class="sidebar-nav">
                <a href="UserDashboard.html" class="sidebar-nav-item"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
                <a href="MyTickets.html" class="sidebar-nav-item active"><i class="fa-solid fa-ticket-alt"></i><span>My Tickets</span></a>
                <a href="submitticket.html" class="sidebar-nav-item"><i class="fa-solid fa-plus-circle"></i><span>Submit Ticket</span></a>
                <a href="reports.html" class="sidebar-nav-item"><i class="fa-solid fa-chart-line"></i><span>Reports</span></a>
                <a href="../Main Dashboard/UserLoginPage.html" class="sidebar-nav-item logout-link"><i class="fa-solid fa-sign-out-alt"></i><span>Logout</span></a>
            </nav>
        </aside>
        
        <section class="admin-content">
                        <div class="content-row full-width">
                                <div class="tickets-management-container">
                                        <h2>My Tickets</h2>
                                        <table>
                                            <thead>
                                                <tr><th>ID</th><th>Title</th><th>Description</th><th>Status</th><th>Created At</th></tr>
                                            </thead>
                                            <tbody id="ticketsTable"></tbody>
                                        </table>
                    
                    <div class="pagination-footer mt-4">
                        <a href="#" class="btn btn-secondary">Load More Tickets</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <span>© <span id="year"></span> <strong>FixBuddy</strong></span>
        <span class="footer-sep">|</span>
       
    </footer>

    <script src="/backend/client.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
