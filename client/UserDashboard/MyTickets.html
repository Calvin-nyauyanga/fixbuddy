<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' blob:; script-src 'self' 'unsafe-inline' blob: https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' http://localhost:5000 http://localhost:5500 ws://localhost:*; img-src 'self' data: https:;">
    <title>FixBuddy - My Tickets</title>
    <link rel="stylesheet" href="../CSS-STYLING-UNIVERSAL/STYLING-UNIVERSAL.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body class="admin-dashboard-body">
    <header class="topbar dashboard-header">
        <div class="logo">🖥️ <span>FixBuddy</span></div>
        <div class="admin-topbar-right">
            <span class="welcome-message" id="welcomeMessage">👋 Hi, User</span>
        </div>
    </header>

    <main class="dashboard-main">
        <aside class="sidebar">
            <h2 class="sidebar-heading">FixBuddy</h2>
            <nav class="sidebar-nav">
                <a href="UserDashboard.html" class="sidebar-nav-item"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
                <a href="MyTickets.html" class="sidebar-nav-item active"><i class="fa-solid fa-ticket-alt"></i><span>My Tickets</span></a>
                <a href="submitticket.html" class="sidebar-nav-item"><i class="fa-solid fa-plus-circle"></i><span>Submit Ticket</span></a>
                <a href="reports.html" class="sidebar-nav-item"><i class="fa-solid fa-chart-line"></i><span>Reports</span></a>
                <a href="#" id="logoutBtn" class="sidebar-nav-item logout-link"><i class="fa-solid fa-sign-out-alt"></i><span>Logout</span></a>
            </nav>
        </aside>

        <section class="admin-content">
            <div class="content-row full-width">
                <div class="tickets-management-container">
                    <h2>All My Tickets</h2>
                    <div id="filterOptions" style="margin-bottom: 1.5rem;">
                        <label>Filter by Status: </label>
                        <select id="statusFilter" onchange="filterTickets()">
                            <option value="">All</option>
                            <option value="open">Open</option>
                            <option value="pending">Pending</option>
                            <option value="solved">Solved</option>
                        </select>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Ticket ID</th>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th>Priority</th>
                                    <th>Status</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="ticketsTableBody">
                                <tr><td colspan="7" style="text-align: center; padding: 20px;">Loading tickets...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <span>© <span id="year"></span> <strong>FixBuddy</strong></span>
    </footer>

    <script src="../js/api-client.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        let allTickets = [];

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            const token = localStorage.getItem('authToken');

            if (!token || !user) {
                window.location.href = '../Main Dashboard/UserLoginPage.html';
                return;
            }

            document.getElementById('welcomeMessage').textContent = `👋 Hi, ${user.name || user.email}`;
            loadAllTickets();
        });

        // Load all tickets
        async function loadAllTickets() {
            const tbody = document.getElementById('ticketsTableBody');

            try {
                const response = await ticketsAPI.getMyTickets();
                if (!response || !response.data) {
                    throw new Error('Invalid tickets response from server');
                }

                allTickets = Array.isArray(response.data.tickets) ? response.data.tickets : [];
                displayTickets(allTickets);
            } catch (error) {
                console.error('Error loading tickets:', error);
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: red;">Error loading tickets: ${error.message}</td></tr>`;
            }
        }

        // Display tickets
        function displayTickets(tickets) {
            const tbody = document.getElementById('ticketsTableBody');
            tbody.innerHTML = '';

            if (!tickets || tickets.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 20px;">No tickets found. <a href="submitticket.html">Submit one now!</a></td></tr>';
                return;
            }

            tickets.forEach(ticket => {
                const row = document.createElement('tr');
                const createdDate = new Date(ticket.created_at).toLocaleDateString();
                const statusClass = ticket.status === 'solved' ? 'solved' : ticket.status === 'pending' ? 'pending' : 'open';
                
                row.innerHTML = `
                    <td>#${ticket.id}</td>
                    <td>${ticket.title}</td>
                    <td>${ticket.category || 'N/A'}</td>
                    <td><span class="priority-badge ${ticket.priority}">${ticket.priority || 'Medium'}</span></td>
                    <td><span class="status-badge ${statusClass}">${ticket.status}</span></td>
                    <td>${createdDate}</td>
                    <td>
                        <button onclick="viewTicketDetails(${ticket.id})" class="btn-small" title="View"><i class="fa-solid fa-eye"></i></button>
                        <button onclick="editTicket(${ticket.id})" class="btn-small" title="Edit"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="deleteTicket(${ticket.id})" class="btn-small btn-danger" title="Delete"><i class="fa-solid fa-trash-alt"></i></button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Filter tickets
        function filterTickets() {
            const status = document.getElementById('statusFilter').value;
            const filtered = status ? allTickets.filter(t => t.status === status) : allTickets;
            displayTickets(filtered);
        }

        // View ticket details
        function viewTicketDetails(ticketId) {
            // For now, just alert. You can create a modal later
            alert(`Viewing ticket #${ticketId}`);
        }

        // Edit ticket
        async function editTicket(ticketId) {
            const newStatus = prompt('Enter new status (open, pending, solved):');
            if (!newStatus) return;

            try {
                await ticketsAPI.update(ticketId, { status: newStatus });
                alert('✅ Ticket updated!');
                await loadAllTickets();
            } catch (error) {
                alert(`❌ Failed to update ticket: ${error.message}`);
            }
        }

        // Delete ticket
        async function deleteTicket(ticketId) {
            if (!confirm('Are you sure you want to delete this ticket?')) return;

            try {
                await ticketsAPI.delete(ticketId);
                alert('✅ Ticket deleted!');
                await loadAllTickets();
            } catch (error) {
                alert(`❌ Failed to delete ticket: ${error.message}`);
            }
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();

            try {
                await authAPI.logout();
            } catch (error) {
                console.warn('Logout failed:', error);
            }

            localStorage.removeItem('authToken');
            localStorage.removeItem('user');
            window.location.href = '../Main Dashboard/UserLoginPage.html';
        });
    </script>
</body>
</html>
