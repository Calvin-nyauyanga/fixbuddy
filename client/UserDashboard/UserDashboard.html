<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../node_modules/@fontsource/poppins/index.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixBuddy – User Dashboard</title>
    <link rel="stylesheet" href="../CSS-STYLING-UNIVERSAL/STYLING-UNIVERSAL.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body class="admin-dashboard-body">
    <header class="topbar dashboard-header">
        <div class="logo">🖥️ <span>FixBuddy</span></div>
        <div class="admin-topbar-right">
            <span class="welcome-message" id="welcomeMessage">👋 Hi, User</span>
            <div class="user-info">
                <i class="fa-solid fa-bell notifications-icon"></i>
                <span class="notification-badge">3</span>
                <i class="fa-solid fa-user-circle admin-profile-icon"></i>
            </div>
        </div>
    </header>

    <main class="dashboard-main">
        <aside class="sidebar">
            <h2 class="sidebar-heading">FixBuddy</h2>
            <nav class="sidebar-nav">
                <a href="UserDashboard.html" class="sidebar-nav-item active"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
                <a href="MyTickets.html" class="sidebar-nav-item"><i class="fa-solid fa-ticket-alt"></i><span>My Tickets</span></a>
                <a href="submitticket.html" class="sidebar-nav-item"><i class="fa-solid fa-plus-circle"></i><span>Submit Ticket</span></a>
                <a href="reports.html" class="sidebar-nav-item"><i class="fa-solid fa-chart-line"></i><span>Reports</span></a>
                <a href="../Main Dashboard/Settings.html" class="sidebar-nav-item"><i class="fa-solid fa-cog"></i><span>Settings</span></a>
                <a href="#" id="logoutBtn" class="sidebar-nav-item logout-link"><i class="fa-solid fa-sign-out-alt"></i><span>Logout</span></a>
            </nav>
        </aside>

        <section class="admin-content">
            <div class="content-row">
                <a href="submitticket.html" class="card action-card btn-primary">
                    <i class="fa-solid fa-plus-circle"></i>
                    <h3>Create New Ticket</h3>
                </a>
                <a href="MyTickets.html" class="card action-card btn-secondary">
                    <i class="fa-solid fa-list-ul"></i>
                    <h3>My Tickets</h3>
                </a>
                <div class="card">
                    <h3>Dashboard</h3>
                    <p class="card-metric" id="ticketCount">0</p>
                    <p class="card-summary">Total tickets created</p>
                </div> 
            </div>

            <div class="content-row full-width">
                <div class="tickets-management-container">
                    <h2>My Recent Tickets</h2>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Ticket ID</th>
                                    <th>Title</th>
                                    <th>Status</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="ticketsTableBody">
                                <tr><td colspan="5" style="text-align: center; padding: 20px;">Loading tickets...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <span>© <span id="year"></span> <strong>FixBuddy</strong></span>
    </footer>

    <script src="../../js/api-client.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // ========== INIT ==========
        async function initDashboard() {
            // Check if user is logged in
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            const token = localStorage.getItem('authToken');

            if (!token || !user) {
                window.location.href = '../Main Dashboard/UserLoginPage.html';
                return;
            }

            // Update welcome message
            document.getElementById('welcomeMessage').textContent = `👋 Hi, ${user.name || user.email}`;

            // Load user's tickets
            await loadUserTickets();
        }

        // ========== LOAD TICKETS ==========
        async function loadUserTickets() {
            const tbody = document.getElementById('ticketsTableBody');
            const ticketCount = document.getElementById('ticketCount');

            try {
                // Fetch user's tickets from backend
                const response = await ticketsAPI.getMyTickets();
                const tickets = response && response.data && Array.isArray(response.data.tickets) ? response.data.tickets : [];

                tbody.innerHTML = '';
                ticketCount.textContent = tickets.length;

                if (tickets.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px;">No tickets created yet. <a href="submitticket.html">Create one now!</a></td></tr>';
                    return;
                }

                // Populate table
                tickets.forEach(ticket => {
                    const row = document.createElement('tr');
                    const createdDate = new Date(ticket.created_at).toLocaleDateString();
                    const statusClass = ticket.status === 'solved' ? 'solved' : ticket.status === 'pending' ? 'pending' : 'open';
                    
                    row.innerHTML = `
                        <td>#${ticket.id}</td>
                        <td>${ticket.title}</td>
                        <td><span class="status-badge ${statusClass}">${ticket.status}</span></td>
                        <td>${createdDate}</td>
                        <td>
                            <button onclick="viewTicket(${ticket.id})" class="btn-small">View</button>
                            <button onclick="deleteTicketConfirm(${ticket.id})" class="btn-small btn-danger">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (error) {
                console.error('Error loading tickets:', error);
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: red;">Error loading tickets: ${error.message}</td></tr>`;
            }
        }

        // ========== VIEW TICKET ==========
        function viewTicket(ticketId) {
            window.location.href = `MyTickets.html?id=${ticketId}`;
        }

        // ========== DELETE TICKET ==========
        async function deleteTicketConfirm(ticketId) {
            if (!confirm('Are you sure you want to delete this ticket?')) return;

            try {
                await ticketsAPI.delete(ticketId);
                alert('✅ Ticket deleted successfully!');
                await loadUserTickets(); // Reload tickets
            } catch (error) {
                alert(`❌ Failed to delete ticket: ${error.message}`);
            }
        }

        // ========== LOGOUT ==========
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();

            try {
                await authAPI.logout();
            } catch (error) {
                console.warn('Logout API call failed:', error);
            }

            // Clear local storage
            localStorage.removeItem('authToken');
            localStorage.removeItem('user');

            // Redirect to login
            window.location.href = '../Main Dashboard/UserLoginPage.html';
        });

        // Initialize dashboard on page load
        window.addEventListener('DOMContentLoaded', initDashboard);
        initDashboard();
    </script>
</body>
</html>
