<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../node_modules/@fontsource/poppins/index.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixBuddy – User Dashboard</title>
    <link rel="stylesheet" href="../CSS-STYLING-UNIVERSAL/STYLING-UNIVERSAL.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../../node_modules/@fontsource/poppins/index.css">
    <script src="/backend/site-utils.js"></script>
</head>
<body class="admin-dashboard-body">
    <header class="topbar dashboard-header">
        <div class="logo">🖥️ <span>FixBuddy</span></div>
        <div class="admin-topbar-right">
            <span class="welcome-message" id="welcomeMessage">👋 Hi, User</span>
            <div class="user-info">
                <i class="fa-solid fa-bell notifications-icon"></i>
                <span class="notification-badge">3</span>
                <i class="fa-solid fa-user-circle admin-profile-icon"></i>
            </div>
        </div>
    </header>

    <main class="dashboard-main">
        <aside class="sidebar">
            <h2 class="sidebar-heading">FixBuddy</h2>
            <nav class="sidebar-nav">
                <a href="UserDashboard.html" class="sidebar-nav-item active"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
                <a href="MyTickets.html" class="sidebar-nav-item"><i class="fa-solid fa-ticket-alt"></i><span>My Tickets</span></a>
                <a href="submitticket.html" class="sidebar-nav-item"><i class="fa-solid fa-plus-circle"></i><span>Submit Ticket</span></a>
                <a href="reports.html" class="sidebar-nav-item"><i class="fa-solid fa-chart-line"></i><span>Reports</span></a>
                <a href="../Main Dashboard/Settings.html" class="sidebar-nav-item"><i class="fa-solid fa-cog"></i><span>Settings</span></a>
                <a href="#" id="logoutBtn" class="sidebar-nav-item logout-link"><i class="fa-solid fa-sign-out-alt"></i><span>Logout</span></a>
            </nav>
        </aside>
        <section class="user-tickets-section">
            <h2>My Tickets</h2>
            <ul id="ticketList" class="ticket-list"></ul>
        </section>
        <script>
        // Get user info from localStorage after login
        let user = null;
        try {
            user = JSON.parse(localStorage.getItem('user'));
        } catch (e) {}
        const user_id = user && user.id ? user.id : 1;
        if(user && user.email) {
            document.getElementById('welcomeMessage').textContent = `👋 Hi, ${user.email}`;
        }
        async function loadTickets() {
            try {
                // Try backend with timeout and fallback
                let tickets = [];
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 3000);
                    const response = await fetch('/api/tickets?user_id=' + user_id, { signal: controller.signal });
                    clearTimeout(timeout);
                    if (response.ok) {
                        tickets = await response.json();
                    } else {
                        throw new Error('Backend unavailable: ' + response.status);
                    }
                } catch (backendErr) {      
                    console.warn('Backend unavailable, using offline fallback:', backendErr.message);
                    // Offline fallback - show sample tickets
                    tickets = [
                        { id: 1, title: 'Sample Ticket - Backend Offline', status: 'Open', created_at: new Date().toISOString() }
                    ];
                }
                
                const list = document.getElementById('ticketList');
                list.innerHTML = '';
                if (Array.isArray(tickets) && tickets.length === 0) {
                    list.innerHTML = '<li class="ticket-item empty">No tickets submitted yet.</li>';
                } else if (Array.isArray(tickets)) {
                    tickets.forEach(ticket => {
                        const li = document.createElement('li');
                        li.className = 'ticket-item';
                        li.textContent = `#${ticket.id}: ${ticket.title} [${ticket.status}]`;
                        if(ticket.status === 'solved') {
                            li.classList.add('solved');
                        }
                        list.appendChild(li);
                    });
                } else {
                    list.innerHTML = '<li class="ticket-item error">Error loading tickets.</li>';
                }
            } catch (err) {
                console.error('Error in loadTickets:', err);
                document.getElementById('ticketList').innerHTML = '<li class="ticket-item error">Error loading tickets. Backend status: check console.</li>';
            }
        }

        // Automatically load tickets when the page loads
        window.addEventListener('DOMContentLoaded', loadTickets);

        /*
        What this code does:
        - Defines a function loadTickets() that fetches tickets for the current user from the backend API.
        - It displays each ticket in a list, coloring solved tickets green.
        - If there are no tickets, it shows a message.
        - If there is an error, it shows an error message.
        - The function is called automatically when the page loads, so the user sees their tickets instantly.
        */
        loadTickets();
        </script>
        </section>
        
        <section class="admin-content">
            <div class="content-row">
                <a href="submitticket.html" class="card action-card btn-primary">
                    <i class="fa-solid fa-plus-circle"></i>
                    <h3>Create New Ticket</h3>
                </a>
                <a id="MyTickets" href="MyTickets.html" class="card action-card btn-secondary" >
                    <i class="fa-solid fa-list-ul"></i>
                    <h3>My Tickets</h3>
                </a>
                <div class="card">
                    <h3>Open Tickets</h3>
                    <p class="card-metric">2</p>
                    <p class="card-summary">Current active tickets</p>
                </div> 
            </div>

            <div class="content-row full-width">
                <div class="tickets-management-container">
                    <h2>My Recent Tickets</h2>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Ticket ID</th>
                                    <th>Title</th>
                                    <th>Submitted</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <span>© <span id="year"></span> <strong>FixBuddy</strong></span>
        
    </footer>
    <script>
        // Display current user if present
        try {
            const current = JSON.parse(localStorage.getItem('fixbuddy_current_user')) || JSON.parse(localStorage.getItem('user')) || null;
            if (current && current.email) {
                document.getElementById('welcomeMessage').textContent = `👋 Hi, ${current.name || current.email}`;
            }
        } catch (e) {}

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', function (e) {
            e.preventDefault();
            // Clear local session keys
            localStorage.removeItem('fixbuddy_current_user');
            localStorage.removeItem('user');
            // Redirect to main dashboard
            window.location.href = '../Main Dashboard/MainDashboard.html';
        });
    </script>

    <script>
        // Ensure dashboard card reliably navigates to view-my-tickets.html (fallback)
        (function(){
            try{
                const card = document.getElementById('openViewTicketsCard');
                if(card){
                    card.addEventListener('click', function(e){
                        if(e.defaultPrevented) return;
                        if(e.metaKey || e.ctrlKey || e.shiftKey || e.button !== 0) return;
                        // debug log for devtools
                        try{ console.log('View Tickets card clicked, navigating...'); }catch(_){}
                        e.preventDefault();
                        window.location.href = 'view-my-tickets.html';
                    });
                }
            }catch(err){ try{ console.warn('nav hook failed', err); }catch(_){} }
        })();

        // Ensure sidebar "My Tickets" link navigates to MyTickets.html
        (function(){
            try{
                // Find all sidebar nav items with My Tickets text or href
                const sidebarItems = document.querySelectorAll('.sidebar-nav-item');
                sidebarItems.forEach(item => {
                    // Check if this is a My Tickets link (by text or current href)
                    if(item.textContent.includes('My Tickets')){
                        item.href = 'MyTickets.html';
                        console.log('Updated sidebar My Tickets link to MyTickets.html');
                    }
                });
            }catch(err){ try{ console.warn('Sidebar nav update failed', err); }catch(_){} }
        })();
    </script>

    </body>
    </html>
