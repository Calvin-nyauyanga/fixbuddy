<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixBuddy - Submit Ticket</title>
    <link rel="stylesheet" href="../CSS-STYLING-UNIVERSAL/STYLING-UNIVERSAL.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body class="admin-dashboard-body">
    <header class="topbar dashboard-header">
        <div class="logo">🖥️ <span>FixBuddy</span></div>
        <div class="admin-topbar-right">
            <span class="welcome-message" id="welcomeMessage">👋 Hi, User</span>
        </div>
    </header>

    <main class="dashboard-main">
        <aside class="sidebar">
            <h2 class="sidebar-heading">FixBuddy</h2>
            <nav class="sidebar-nav">
                <a href="UserDashboard.html" class="sidebar-nav-item"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
                <a href="MyTickets.html" class="sidebar-nav-item"><i class="fa-solid fa-ticket-alt"></i><span>My Tickets</span></a>
                <a href="submitticket.html" class="sidebar-nav-item active"><i class="fa-solid fa-plus-circle"></i><span>Submit Ticket</span></a>
                <a href="reports.html" class="sidebar-nav-item"><i class="fa-solid fa-chart-line"></i><span>Reports</span></a>
                <a href="#" id="logoutBtn" class="sidebar-nav-item logout-link"><i class="fa-solid fa-sign-out-alt"></i><span>Logout</span></a>
            </nav>
        </aside>

        <section class="admin-content">
            <div class="content-row full-width">
                <div class="form-container">
                    <h2>Submit a New Ticket</h2>
                    <form id="ticketForm" onsubmit="handleSubmitTicket(event)">
                        <div class="form-group">
                            <label for="title">Ticket Title</label>
                            <input type="text" id="title" name="title" placeholder="Brief description of your issue" required>
                        </div>

                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" name="description" placeholder="Detailed description of your problem..." rows="6" required></textarea>
                        </div>

                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" name="category" required>
                                <option value="">Select a category</option>
                                <option value="bug">Bug Report</option>
                                <option value="feature">Feature Request</option>
                                <option value="support">Support</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="priority">Priority</label>
                            <select id="priority" name="priority" required>
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                                <option value="critical">Critical</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary" id="submitBtn">Submit Ticket</button>
                        <div id="submitMessage" style="margin-top: 1em; text-align: center;"></div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <span>© <span id="year"></span> <strong>FixBuddy</strong></span>
    </footer>

    <script src="../js/api-client.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // Check authentication
        window.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            const token = localStorage.getItem('authToken');

            if (!token || !user) {
                window.location.href = '../Main Dashboard/UserLoginPage.html';
                return;
            }

            document.getElementById('welcomeMessage').textContent = `👋 Hi, ${user.name || user.email}`;
        });

        // Handle ticket submission
        async function handleSubmitTicket(event) {
            event.preventDefault();

            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const category = document.getElementById('category').value;
            const priority = document.getElementById('priority').value;
            const submitBtn = document.getElementById('submitBtn');
            const submitMessage = document.getElementById('submitMessage');

            // Validation
            if (!title || !description || !category) {
                submitMessage.textContent = '❌ Please fill in all required fields';
                submitMessage.style.color = '#d32f2f';
                return;
            }

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            submitMessage.textContent = '';

            try {
                // Create ticket via backend
                const ticketData = {
                    title,
                    description,
                    category,
                    priority,
                    status: 'open'
                };

                const response = await ticketsAPI.create(ticketData);

                // Success
                submitMessage.textContent = `✅ Ticket submitted successfully! Ticket ID: #${response.id}`;
                submitMessage.style.color = '#4caf50';

                // Reset form
                document.getElementById('ticketForm').reset();

                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = 'MyTickets.html';
                }, 2000);

            } catch (error) {
                console.error('Submit error:', error);
                submitMessage.textContent = `❌ Failed to submit ticket: ${error.message}`;
                submitMessage.style.color = '#d32f2f';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Ticket';
            }
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();

            try {
                await authAPI.logout();
            } catch (error) {
                console.warn('Logout failed:', error);
            }

            localStorage.removeItem('authToken');
            localStorage.removeItem('user');
            window.location.href = '../Main Dashboard/UserLoginPage.html';
        });
    </script>
</body>
</html>
