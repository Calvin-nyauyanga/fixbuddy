<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' blob:; connect-src 'self' http://localhost:5000 http://localhost:5500 ws://localhost:*; script-src 'self' 'unsafe-inline' blob: https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:;">
    <meta name="theme-color" content="#fff">
    <title>FixBuddy - Sign Up</title>
    <link rel="stylesheet" href="../CSS-STYLING-UNIVERSAL/STYLING-UNIVERSAL.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <main class="login-container">
        <header>
            <div id="siteNav" style="position:absolute; right:1rem; top:1rem;"></div>
        </header>
        <div class="login-card">
            <h1 class="login-heading">Create an Account</h1>
            <p class="login-subheading">Join FixBuddy to submit and track your tickets</p>
            <form id="signupForm" class="signup-form" onsubmit="handleSignupSubmit(event)">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="john.doe@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary login-btn" id="signupBtn">Sign Up</button>
                <div id="signupMessage" style="margin-top:1em; text-align: center;"></div>
            </form>
            <div class="register-link">
                Already have an account? <a href="UserLoginPage.html">Sign In</a>
            </div>
        </div>
    </main>

    <footer>
        <span>© <span id="year"></span> <strong>FixBuddy</strong></span>
        <span class="footer-sep">|</span>
    </footer>

    <script src="../js/api-client.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        async function handleSignupSubmit(event) {
            event.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const signupBtn = document.getElementById('signupBtn');
            const signupMessage = document.getElementById('signupMessage');

            // Validation
            if (!name || !email || !password || !confirmPassword) {
                signupMessage.textContent = '❌ Please fill in all fields';
                signupMessage.style.color = '#d32f2f';
                return;
            }

            if (password.length < 6) {
                signupMessage.textContent = '❌ Password must be at least 6 characters';
                signupMessage.style.color = '#d32f2f';
                return;
            }

            if (password !== confirmPassword) {
                signupMessage.textContent = '❌ Password and confirm password do not match';
                signupMessage.style.color = '#d32f2f';
                return;
            }

            // Disable button during request
            signupBtn.disabled = true;
            signupBtn.textContent = 'Creating Account...';
            signupMessage.textContent = '';

            try {
                // Call backend signup endpoint
                const response = await authAPI.signup(name, email, password, confirmPassword);

                // Store auth token
                if (response.token) {
                    localStorage.setItem('authToken', response.token);
                }

                // Store user info
                if (response.data) {
                    localStorage.setItem('user', JSON.stringify(response.data));
                }

                // Show success message
                signupMessage.textContent = '✅ Account created! Redirecting to dashboard...';
                signupMessage.style.color = '#4caf50';

                // Redirect to dashboard after 1 second
                setTimeout(() => {
                    window.location.href = '../UserDashboard/UserDashboard.html';
                }, 1000);

            } catch (error) {
                console.error('Signup error:', error);
                signupMessage.textContent = `❌ Signup failed: ${error.message}`;
                signupMessage.style.color = '#d32f2f';
                signupBtn.disabled = false;
                signupBtn.textContent = 'Sign Up';
            }
        }
    </script>
</body>
</html>
