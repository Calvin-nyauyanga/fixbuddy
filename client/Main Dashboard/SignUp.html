<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../node_modules/@fontsource/poppins/index.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fff">
    <title>FixBuddy - Sign Up</title>
    <link rel="stylesheet" href="../CSS-STYLING-UNIVERSAL/STYLING-UNIVERSAL.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/backend/site-utils.js"></script>
</head>
<body class="login-body">

    <main class="login-container">
        <header>
            <div id="siteNav" style="position:absolute; right:1rem; top:1rem;"></div>
        </header>
        <div class="login-card">
            <h1 class="login-heading">Create an Account</h1>
            <p class="login-subheading">Join FixBuddy to submit and track your tickets</p>
            <form action="#" method="POST" class="signup-form" autocomplete="on" onsubmit="return false;">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="john.doe@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <!-- Confirm Password removed -->
                </div>
                <button type="submit" class="btn btn-primary login-btn">Sign Up</button>
                <div id="signupMessage" style="margin-top:1em;"></div>
                <script src="/backend/offline-auth.js"></script>
            </form>
            <div class="register-link">
                Already have an account? <a href="UserLoginPage.html">Sign In</a>
            </div>
        </div>
    </main>

    <footer>
        <span>© <span id="year"></span> <strong>FixBuddy</strong></span>
        <span class="footer-sep">|</span>
    
    </footer>
    
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
