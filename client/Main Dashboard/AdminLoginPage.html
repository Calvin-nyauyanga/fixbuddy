<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:5000; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' https:;">
    <title>FixBuddy - Admin Login</title>
    <link rel="stylesheet" href="../CSS-STYLING-UNIVERSAL/STYLING-UNIVERSAL.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="../../node_modules/@fontsource/poppins/index.css" />
</head>
<body class="login-body">
    <header class="page-top">
        <div id="siteNav" style="position:absolute; right:1rem; top:1rem;">
            <a href="MainDashboard.html" class="btn btn-secondary" style="margin-right: 1rem;">Back to Home</a>
        </div>
    </header>
    <main class="login-container">
        <div class="login-card">
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <i class="fa-solid fa-shield-admin" style="font-size: 2.5rem; color: #ff9800;"></i>
            </div>
            <h1 class="login-heading">FixBuddy Admin Portal</h1>
            <p class="login-subheading">Admin access only - Please sign in</p>
            <form id="adminLoginForm" class="login-form" onsubmit="handleAdminLoginSubmit(event)">
                <div class="form-group">
                    <label for="adminEmail">Admin Email</label>
                    <input type="email" id="adminEmail" name="email" placeholder="admin@fixbuddy.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <div class="form-group">
                    <label for="adminCode">Admin Code (2FA)</label>
                    <input type="text" id="adminCode" name="adminCode" placeholder="Enter your 6-digit code" required maxlength="6">
                </div>
                <div class="form-options">
                    <a href="#">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary login-btn" id="adminLoginBtn">Sign In as Admin</button>
                <div id="adminLoginMessage" style="margin-top:1em; text-align: center;"></div>
            </form>
            <div class="login-options-footer">
                <a href="UserLoginPage.html" class="btn btn-secondary login-btn mb-1">Sign in as User instead</a>
            </div>
        </div>
    </main>

    <footer>
        <span>© <span id="year"></span> <strong>FixBuddy</strong></span>
        <span class="footer-sep">|</span>
    </footer>

    <script src="../../js/api-client.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        async function handleAdminLoginSubmit(event) {
            event.preventDefault();

            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const adminCode = document.getElementById('adminCode').value.trim();
            const loginBtn = document.getElementById('adminLoginBtn');
            const loginMessage = document.getElementById('adminLoginMessage');

            // Validation
            if (!email || !password || !adminCode) {
                loginMessage.textContent = '❌ Please fill in all fields';
                loginMessage.style.color = '#d32f2f';
                return;
            }

            if (adminCode.length !== 6 || isNaN(adminCode)) {
                loginMessage.textContent = '❌ Admin code must be 6 digits';
                loginMessage.style.color = '#d32f2f';
                return;
            }

            // Disable button during request
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            loginMessage.textContent = '';

            try {
                // Call backend admin login endpoint
                const response = await adminAPI.login(email, password, adminCode);

                // Store auth token
                if (response.token) {
                    localStorage.setItem('authToken', response.token);
                }

                // Store admin info
                if (response.data) {
                    localStorage.setItem('admin', JSON.stringify(response.data));
                    localStorage.setItem('userRole', 'admin');
                }

                // Show success message
                loginMessage.textContent = '✅ Admin login successful! Redirecting...';
                loginMessage.style.color = '#4caf50';

                // Redirect to admin dashboard after 1 second
                setTimeout(() => {
                    window.location.href = '../AdminDashBoard/AdminDashBoard.html';
                }, 1000);

            } catch (error) {
                console.error('Admin login error:', error);
                loginMessage.textContent = `❌ Login failed: ${error.message}`;
                loginMessage.style.color = '#d32f2f';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In as Admin';
            }
        }
    </script>
</body>
</html>
