<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' blob:; connect-src 'self' http://localhost:5000 http://localhost:5500 ws://localhost:* https://accounts.google.com; script-src 'self' 'unsafe-inline' blob: https://accounts.google.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://accounts.google.com https:;">
    <title>FixBuddy - Login</title>
    <link rel="stylesheet" href="../CSS-STYLING-UNIVERSAL/STYLING-UNIVERSAL.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="../../node_modules/@fontsource/poppins/index.css" />
</head>
<body class="login-body">
    <header class="page-top">
        <div id="siteNav" style="position:absolute; right:1rem; top:1rem;"></div>
    </header>
    <main class="login-container">
        <div class="login-card">
            <h1 class="login-heading">Welcome to FixBuddy</h1>
            <p class="login-subheading">Please sign in to your account</p>
            <form id="loginForm" class="login-form" onsubmit="handleLoginSubmit(event)">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="john.doe@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <div class="form-options">
                    <a href="#">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary login-btn" id="loginBtn">Sign In</button>
                <div id="loginMessage" style="margin-top:1em; text-align: center;"></div>
            </form>
            <div class="login-options-footer">
                <a href="SignUp.html" class="btn btn-secondary login-btn mb-1">Don't have an account? Sign Up</a>
            </div>
        </div>
    </main>

    <footer>
        <span>© <span id="year"></span> <strong>FixBuddy</strong></span>
        <span class="footer-sep">|</span>
    </footer>

    <script src="../js/api-client.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        async function handleLoginSubmit(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginMessage = document.getElementById('loginMessage');

            // Validation
            if (!email || !password) {
                loginMessage.textContent = '❌ Please fill in all fields';
                loginMessage.style.color = '#d32f2f';
                return;
            }

            // Disable button during request
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            loginMessage.textContent = '';

            try {
                // Call backend login endpoint
                const response = await authAPI.login(email, password);

                // Store auth token
                if (response.token) {
                    localStorage.setItem('authToken', response.token);
                }

                // Store user info
                if (response.data) {
                    localStorage.setItem('user', JSON.stringify(response.data));
                }

                // Show success message
                loginMessage.textContent = '✅ Login successful! Redirecting...';
                loginMessage.style.color = '#4caf50';

                // Redirect to dashboard after 1 second
                setTimeout(() => {
                    window.location.href = '../UserDashboard/UserDashboard.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                loginMessage.textContent = `❌ Login failed: ${error.message}`;
                loginMessage.style.color = '#d32f2f';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        }
    </script>
</body>
</html>
