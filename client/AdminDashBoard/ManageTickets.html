<!-- Add this section for detailed ticket view and response system -->
<section class="ticket-detail-section" id="ticketDetailSection" style="display: none;">
    <div class="detail-card">
        <h2>Ticket #<span id="detailTicketId"></span> - <span id="detailTicketTitle"></span></h2>
        
        <div class="ticket-meta">
            <div class="meta-item">
                <strong>Customer:</strong> <span id="detailCustomerName"></span>
            </div>
            <div class="meta-item">
                <strong>Email:</strong> <span id="detailCustomerEmail"></span>
            </div>
            <div class="meta-item">
                <strong>Created:</strong> <span id="detailCreatedDate"></span>
            </div>
            <div class="meta-item">
                <strong>Priority:</strong> <span id="detailPriority" class="status-badge"></span>
            </div>
            <div class="meta-item">
                <strong>Status:</strong> <span id="detailStatus" class="status-badge"></span>
            </div>
        </div>

        <div class="ticket-description">
            <h3>Description</h3>
            <p id="detailDescription"></p>
        </div>

        <!-- Conversation Thread -->
        <div class="conversation-thread" id="conversationThread">
            <h3>Conversation</h3>
            <div id="messagesContainer" style="max-height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 1rem; margin-bottom: 1rem; background: #f9f9f9;">
                <!-- Messages will be loaded here -->
            </div>
        </div>

        <!-- Admin Response Form -->
        <div class="admin-response-form">
            <h3>Add Response</h3>
            <form id="responseForm" onsubmit="submitAdminResponse(event)">
                <textarea id="responseText" placeholder="Type your response to the customer..." required style="width: 100%; min-height: 100px; padding: 0.5rem; margin-bottom: 1rem;"></textarea>
                <div style="display: flex; gap: 0.5rem;">
                    <button type="submit" class="btn btn-primary">Send Response</button>
                    <button type="button" class="btn btn-secondary" onclick="markTicketSolved()">Mark as Solved</button>
                    <button type="button" class="btn btn-secondary" onclick="closeTicket()">Close Ticket</button>
                </div>
            </form>
        </div>

        <button onclick="closeDetailView()" class="btn btn-secondary" style="margin-top: 1rem;">Back to List</button>
    </div>
</section>

<!-- JavaScript for detail view -->
<script>
async function viewTicketDetail(ticketId) {
    try {
        const response = await helpdeskAPI.getTicketDetails(ticketId);
        const ticket = response.data || {};

        // Display ticket details
        document.getElementById('detailTicketId').textContent = ticket.id;
        document.getElementById('detailTicketTitle').textContent = ticket.title;
        document.getElementById('detailCustomerName').textContent = ticket.user_name || 'Unknown';
        document.getElementById('detailCustomerEmail').textContent = ticket.user_email || 'N/A';
        document.getElementById('detailCreatedDate').textContent = new Date(ticket.created_at).toLocaleString();
        document.getElementById('detailPriority').textContent = ticket.priority || 'Medium';
        document.getElementById('detailStatus').textContent = ticket.status || 'Open';
        document.getElementById('detailDescription').textContent = ticket.description || 'No description provided';

        // Load conversation
        loadTicketConversation(ticketId);

        // Store current ticket ID
        window.currentTicketId = ticketId;

        // Show detail view
        document.getElementById('ticketDetailSection').style.display = 'block';
        document.querySelector('.tickets-management-container').style.display = 'none';
    } catch (error) {
        alert(`Error loading ticket: ${error.message}`);
    }
}

async function loadTicketConversation(ticketId) {
    const container = document.getElementById('messagesContainer');
    container.innerHTML = '<p>Loading messages...</p>';

    try {
        const response = await helpdeskAPI.getTicketDetails(ticketId);
        const ticket = response.data || {};
        const messages = ticket.messages || [];

        container.innerHTML = '';

        if (messages.length === 0) {
            container.innerHTML = '<p style="text-align: center; color: #999;">No messages yet. Start the conversation below.</p>';
            return;
        }

        messages.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.style.marginBottom = '1rem';
            msgDiv.style.padding = '0.75rem';
            msgDiv.style.borderRadius = '4px';
            msgDiv.style.backgroundColor = msg.sender === 'admin' ? '#e3f2fd' : '#f5f5f5';
            msgDiv.style.borderLeft = msg.sender === 'admin' ? '4px solid #2196F3' : '4px solid #999';
            
            const time = new Date(msg.created_at).toLocaleTimeString();
            msgDiv.innerHTML = `
                <strong>${msg.sender === 'admin' ? '👨‍💼 Admin' : '👤 Customer'}</strong> - ${time}
                <p>${msg.text || msg.message}</p>
            `;
            container.appendChild(msgDiv);
        });

        // Auto-scroll to bottom
        container.scrollTop = container.scrollHeight;
    } catch (error) {
        container.innerHTML = `<p style="color: red;">Error loading messages: ${error.message}</p>`;
    }
}

async function submitAdminResponse(event) {
    event.preventDefault();
    const ticketId = window.currentTicketId;
    const responseText = document.getElementById('responseText').value;

    if (!responseText.trim()) {
        alert('Please enter a response');
        return;
    }

    try {
        await helpdeskAPI.addResponse(ticketId, responseText, 'admin');
        alert('✅ Response sent to customer!');
        document.getElementById('responseText').value = '';
        await loadTicketConversation(ticketId);
    } catch (error) {
        alert(`❌ Failed to send response: ${error.message}`);
    }
}

async function markTicketSolved() {
    const ticketId = window.currentTicketId;
    const solution = prompt('Enter the solution/resolution:');
    
    if (!solution) return;

    try {
        await helpdeskAPI.solveTicket(ticketId, solution);
        alert('✅ Ticket marked as solved!');
        closeDetailView();
    } catch (error) {
        alert(`❌ Failed to solve ticket: ${error.message}`);
    }
}

async function closeTicket() {
    const ticketId = window.currentTicketId;
    
    if (!confirm('Are you sure you want to close this ticket?')) return;

    try {
        await helpdeskAPI.closeTicket(ticketId);
        alert('✅ Ticket closed!');
        closeDetailView();
    } catch (error) {
        alert(`❌ Failed to close ticket: ${error.message}`);
    }
}

function closeDetailView() {
    document.getElementById('ticketDetailSection').style.display = 'none';
    document.querySelector('.tickets-management-container').style.display = 'block';
    window.currentTicketId = null;
}
</script>
